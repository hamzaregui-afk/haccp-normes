name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Lint & Type-check ─────────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Type-check
        run: pnpm typecheck

  # ─── 2. Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test --passWithNoTests
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: '**/coverage/**'
          retention-days: 7

  # ─── 3. Integration Tests ────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_secret_key_must_be_at_least_32_chars
      JWT_REFRESH_SECRET: ci_refresh_secret_key_must_be_at_least_32_chars
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Create test databases
        run: |
          for db in haccp_auth haccp_users haccp_tenants haccp_controls haccp_nonconformities haccp_assets haccp_reports haccp_dlc haccp_audit haccp_notifications; do
            psql postgresql://postgres:postgres@localhost:5432/postgres -c "CREATE DATABASE $db;" || true
          done
      - name: Run integration tests
        run: pnpm test:integration --passWithNoTests

  # ─── 4. E2E Tests (web) ───────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on PRs to main to avoid slowing down develop pushes
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @haccp/web exec playwright install --with-deps chromium
      - name: Build shared packages
        run: |
          pnpm --filter @haccp/shared-types build
          pnpm --filter @haccp/shared-validators build
          pnpm --filter @haccp/shared-errors build
          pnpm --filter @haccp/shared-utils build
      - name: Build web app
        run: pnpm --filter @haccp/web build
        env:
          VITE_API_URL: http://localhost:80
          VITE_WS_URL: ws://localhost:80
      - name: Run Playwright E2E tests
        run: pnpm --filter @haccp/web exec playwright test
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ─── 5. Build Docker images (dry-run, no push) ───────────────────────────
  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    # Only on PRs — push to develop doesn't need a full docker build
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - tenant-service
          - control-service
          - nonconformity-service
          - asset-service
          - notification-service
          - report-service
          - dlc-service
          - audit-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: haccp/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
