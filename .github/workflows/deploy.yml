name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'init-superadmin-only'
        type: choice
        options:
          - full-deploy
          - restart-only
          - init-superadmin-only

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout: 60m
          script: |
            set -e
            ACTION="${{ github.event.inputs.action || 'full-deploy' }}"
            echo "=== Action: $ACTION ==="

            cd /opt/haccp

            if [ "$ACTION" = "init-superadmin-only" ]; then
              echo "=== Creating SUPER_ADMIN only (no build) ==="
              git pull origin main
              docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
              docker exec \
                -e SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}" \
                -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
                haccp-auth node /tmp/create-superadmin.js
              echo "✅ SUPER_ADMIN created"
              exit 0
            fi

            if [ "$ACTION" = "restart-only" ]; then
              echo "=== Restarting services (no build) ==="
              git pull origin main
              docker compose up -d --remove-orphans
              sleep 20
              docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
              docker exec \
                -e SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}" \
                -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
                haccp-auth node /tmp/create-superadmin.js || echo "⚠️  SUPER_ADMIN init skipped (non-fatal)"
              echo "✅ Services restarted"
              exit 0
            fi

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding changed images ==="
            # BuildKit inline cache — layers are reused across runs
            DOCKER_BUILDKIT=1 docker compose build --parallel

            echo "=== Restarting services ==="
            docker compose up -d --remove-orphans

            echo "=== Verifying health ==="
            sleep 20
            docker compose ps --format "table {{.Name}}\t{{.Status}}" | grep -v "unhealthy" | head -20

            echo "=== Ensuring SUPER_ADMIN exists ==="
            # Copy the init script into the auth container and run it.
            # Idempotent: ON CONFLICT DO UPDATE — safe on every deploy.
            docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
            docker exec \
              -e SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}" \
              -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
              haccp-auth node /tmp/create-superadmin.js || echo "⚠️  SUPER_ADMIN init skipped (non-fatal)"

            echo "=== Gateway smoke test ==="
            curl -sf http://localhost/health | grep '"status":"ok"'
            echo "✅ Deploy successful"
