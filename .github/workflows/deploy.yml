name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'init-superadmin-only'
        type: choice
        options:
          - full-deploy
          - setup-https
          - restart-only
          - reload-gateway
          - run-migrations
          - init-tenant-modules
          - init-superadmin-only
          - diagnose
          - free-space-and-recover
          - reset-password

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-flight deploy

jobs:
  # ── External connectivity probe (runs on GitHub Actions runner, NOT on server)
  # ── Only runs for the 'diagnose' action — provides an external-IP perspective
  external-probe:
    name: External connectivity probe
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'diagnose' }}
    steps:
      - name: Probe server from GitHub Actions runner (external IP)
        run: |
          SERVER="http://178.105.126.165"
          echo "========================================"
          echo "=== EXTERNAL PROBE from GitHub Actions runner ==="
          echo "=== Runner IP: $(curl -s https://api.ipify.org || echo unknown) ==="
          echo "========================================"

          echo "--- GET /health on port 80 ---"
          curl -sv --max-time 10 "$SERVER/health" 2>&1 | tail -20 || echo "FAILED: GET port 80"

          echo "--- GET /health on port 3001 ---"
          curl -sv --max-time 10 "$SERVER:3001/health" 2>&1 | tail -20 || echo "FAILED: GET port 3001"

          echo "--- POST /api/v1/auth/login on port 80 ---"
          HTTP80=$(curl -sv --max-time 15 -X POST "$SERVER/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Origin: $SERVER:3001" \
            -H "Referer: $SERVER:3001/login" \
            -d '{"email":"probe@test.com","password":"ProbeTest123!"}' 2>&1)
          echo "$HTTP80" | tail -25
          echo "--- HTTP 401 = server reachable, HTTP 000/empty = blocked ---"

          echo "--- POST /api/v1/auth/login on port 3001 ---"
          HTTP3001=$(curl -sv --max-time 15 -X POST "$SERVER:3001/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Origin: $SERVER:3001" \
            -H "Referer: $SERVER:3001/login" \
            -d '{"email":"probe@test.com","password":"ProbeTest123!"}' 2>&1)
          echo "$HTTP3001" | tail -25
          echo "--- HTTP 401 = server reachable, HTTP 000/empty = blocked ---"

          echo "========================================"
          echo "=== SUMMARY ==="
          GET80=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "$SERVER/health" 2>/dev/null || echo "ERR")
          GET3001=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "$SERVER:3001/health" 2>/dev/null || echo "ERR")
          POST80=$(curl -so /dev/null -w "%{http_code}" --max-time 15 -X POST "$SERVER/api/v1/auth/login" \
            -H "Content-Type: application/json" -d '{"email":"x","password":"x"}' 2>/dev/null || echo "ERR")
          POST3001=$(curl -so /dev/null -w "%{http_code}" --max-time 15 -X POST "$SERVER:3001/api/v1/auth/login" \
            -H "Content-Type: application/json" -d '{"email":"x","password":"x"}' 2>/dev/null || echo "ERR")
          echo "GET  port 80:   HTTP $GET80"
          echo "GET  port 3001: HTTP $GET3001"
          echo "POST port 80:   HTTP $POST80"
          echo "POST port 3001: HTTP $POST3001"
          echo ""
          echo "Expected: all should be HTTP 200 or 401 (means server is reachable)"
          echo "If POST shows ERR/000: port 3001 POST is blocked at network level"
          echo "If GET works but POST fails: ISP/firewall blocks POST on non-standard port"
          echo "Solution: use port 80 (no :3001 in URL) or add HTTPS + domain"
          echo "========================================"

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Compute bcrypt hash (for init-superadmin-only)
        if: ${{ github.event.inputs.action == 'init-superadmin-only' || github.event.inputs.action == 'free-space-and-recover' || github.event.inputs.action == 'reset-password' || github.event.inputs.action == 'full-deploy' || github.event_name == 'push' }}
        run: |
          npm install bcryptjs --no-save --silent
          HASH=$(node -e "
            const b = require('bcryptjs');
            b.hash(process.env.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!', 10).then(h => process.stdout.write(h));
          ")
          echo "SUPERADMIN_HASH=$HASH" >> $GITHUB_ENV
        env:
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPERADMIN_HASH: ${{ env.SUPERADMIN_HASH }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SUPERADMIN_HASH,SUPERADMIN_EMAIL,SUPERADMIN_PASSWORD
          script_stop: true
          timeout: 60m
          script: |
            set -e
            ACTION="${{ github.event.inputs.action || 'full-deploy' }}"
            echo "=== Action: $ACTION ==="

            echo "=== Freeing Docker build cache ==="
            docker builder prune -f 2>/dev/null || true
            df -h / | tail -1

            if [ "$ACTION" = "setup-https" ]; then
              echo "=== Generating self-signed SSL certificate ==="
              mkdir -p /opt/haccp/ssl
              openssl req -x509 -newkey rsa:2048 -days 3650 -nodes \
                -keyout /opt/haccp/ssl/key.pem \
                -out /opt/haccp/ssl/cert.pem \
                -subj "/C=TN/ST=Tunis/L=Tunis/O=HACCP/CN=178.105.126.165" \
                -addext "subjectAltName=IP:178.105.126.165"
              chmod 644 /opt/haccp/ssl/cert.pem
              chmod 600 /opt/haccp/ssl/key.pem
              echo "=== Certificate generated ==="
              openssl x509 -in /opt/haccp/ssl/cert.pem -noout -subject -dates
              echo "=== Pulling latest code ==="
              cd /opt/haccp
              git fetch origin && git checkout main-sync 2>/dev/null || true && git reset --hard origin/main-sync
              echo "=== Setting VITE_API_URL to HTTPS ==="
              printf 'VITE_API_URL=https://178.105.126.165\nVITE_WS_URL=\n' > apps/web/.env
              cat apps/web/.env
              echo "=== Rebuilding web app with HTTPS URL ==="
              DOCKER_BUILDKIT=1 docker compose build --parallel web
              echo "=== Recreating gateway with HTTPS config ==="
              docker compose up -d --force-recreate api-gateway web
              sleep 8
              echo "=== Verifying HTTPS ==="
              curl -sk https://localhost:443/health && echo "HTTPS port 443: OK" || echo "HTTPS port 443: FAILED"
              curl -sk https://localhost:443/api/v1/auth/login -X POST \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"${SUPERADMIN_EMAIL:-superadmin@haccp.com}\",\"password\":\"${SUPERADMIN_PASSWORD:-Admin@HACCP2024!}\"}" | cut -c1-80
              echo "=== HTTPS setup complete ==="
              echo "=== Access the app at: https://178.105.126.165 ==="
              echo "=== Browser will show a security warning — click Advanced > Proceed ==="
              exit 0
            fi

            if [ "$ACTION" = "reload-gateway" ]; then
              echo "=== Reloading api-gateway nginx config ==="
              cd /opt/haccp
              git fetch origin && git checkout main-sync 2>/dev/null || true && git reset --hard origin/main-sync
              echo "=== Git commit after pull ==="
              git log --oneline -2
              echo "=== Testing nginx config validity (nginx -t inside container) ==="
              docker exec haccp-gateway nginx -t 2>&1 || true
              # ARCH-DECISION: Use force-recreate (not restart) so that port binding
              # changes in docker-compose.yml are applied. `docker compose restart`
              # keeps the same container spec — it does NOT re-read port mappings.
              # `--force-recreate` stops + removes + creates a new container from the
              # current compose definition, picking up port and volume changes.
              echo "=== Force-recreating api-gateway (applies port binding + config changes) ==="
              docker compose up -d --force-recreate api-gateway
              echo "=== Gateway recreated — waiting 5s for nginx to bind ports ==="
              sleep 5
              echo "=== Verifying port 80 health ==="
              curl -sf http://localhost:80/health && echo "Port 80: OK" || echo "Port 80: FAILED"
              echo "=== Verifying port 3001 redirect (expect HTTP 301) ==="
              HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" --max-time 5 http://localhost:3001/ || echo "ERR")
              echo "Port 3001 response: HTTP $HTTP_CODE (expect 301)"
              if [ "$HTTP_CODE" = "301" ]; then
                echo "=== PORT 3001 REDIRECT: ACTIVE — ISP POST blocking bypassed ==="
              else
                echo "=== PORT 3001 REDIRECT: not active yet (got $HTTP_CODE) ==="
              fi
              LOCATION=$(curl -sI --max-time 5 http://localhost:3001/ | grep -i "^location:" || echo "no Location header")
              echo "Redirect target: $LOCATION"
              exit 0
            fi

            if [ "$ACTION" = "init-superadmin-only" ]; then
              echo "=== Inserting SUPER_ADMIN via psql (no module deps) ==="
              ADMIN_ID="clx_superadmin_platform_01"
              ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              ADMIN_HASH="$SUPERADMIN_HASH"

              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              echo "=== DB user: $PGUSER ==="

              SQL_AUTH=$(printf "INSERT INTO users (id,email,name,password_hash,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','%s','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (email) DO UPDATE SET password_hash=EXCLUDED.password_hash,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL" "$ADMIN_HASH")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL_AUTH"
              echo "=== haccp_auth OK ==="

              SQL_USERS=$(printf "INSERT INTO users (id,email,name,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (id) DO UPDATE SET name=EXCLUDED.name,role=EXCLUDED.role,status=EXCLUDED.status,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_users -c "$SQL_USERS" || true
              echo "=== haccp_users OK ==="
              exit 0
            fi

            if [ "$ACTION" = "reset-password" ]; then
              echo "=== Resetting superadmin password to SUPERADMIN_PASSWORD secret ==="
              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              ADMIN_HASH="$SUPERADMIN_HASH"
              SQL=$(printf "UPDATE users SET password_hash='%s', updated_at=NOW() WHERE email='%s';" "$ADMIN_HASH" "$ADMIN_EMAIL")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL"
              echo "=== Restarting auth service to reset in-memory throttler (clears IP bans) ==="
              docker restart haccp-auth
              sleep 10
              echo "=== Auth service restarted ==="
              echo "=== Verifying login from server ==="
              LOGIN=$(curl -s -X POST http://localhost/api/v1/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"${SUPERADMIN_PASSWORD:-Admin@HACCP2024!}\"}")
              if echo "$LOGIN" | grep -q "accessToken"; then
                echo "=== ALL OK: password updated + throttler reset + login confirmed ==="
                echo "=== Email: $ADMIN_EMAIL ==="
                echo "=== Password: use SUPERADMIN_PASSWORD secret value ==="
              else
                echo "=== FAILED: $LOGIN ==="
              fi
              exit 0
            fi

            if [ "$ACTION" = "free-space-and-recover" ]; then
              echo "=== Disk BEFORE cleanup ==="
              df -h /

              echo "=== Top space consumers ==="
              du -sh /var/lib/docker/containers 2>/dev/null | head -5 || true
              du -sh /var/lib/docker/overlay2 2>/dev/null | head -5 || true
              du -sh /opt/haccp 2>/dev/null | head -5 || true
              du -sh /var/log 2>/dev/null | head -5 || true

              echo "=== BIGGEST WIN: Truncating all container log files (safe, no data loss) ==="
              find /var/lib/docker/containers -name "*-json.log" -exec truncate -s 0 {} \; 2>/dev/null || true
              echo "=== Logs truncated ==="

              echo "=== Truncating system journal to 50MB ==="
              journalctl --vacuum-size=50M 2>/dev/null || true

              echo "=== Removing unused Docker images ==="
              docker image prune -a -f 2>/dev/null || true

              echo "=== Removing stopped containers ==="
              docker container prune -f 2>/dev/null || true

              echo "=== Clearing /tmp ==="
              rm -rf /tmp/* 2>/dev/null || true

              echo "=== Removing host node_modules if present (containers have their own copies) ==="
              rm -rf /opt/haccp/node_modules 2>/dev/null || true
              find /opt/haccp/services -maxdepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true
              find /opt/haccp/apps -maxdepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true

              echo "=== Disk AFTER cleanup ==="
              df -h /

              echo "=== Restarting postgres container to exit recovery mode ==="
              docker stop haccp-postgres 2>/dev/null || true
              sleep 3
              docker start haccp-postgres
              sleep 20

              echo "=== Postgres status ==="
              docker inspect haccp-postgres --format "{{.State.Status}} {{.State.Health.Status}}" 2>/dev/null || true

              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER 2>/dev/null) || true
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD 2>/dev/null) || true
              echo "=== Testing psql connection ==="
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "SELECT 'DB_OK' as status;" 2>&1 || echo "DB STILL NOT READY"

              echo "=== Re-inserting superadmin (in case data was lost) ==="
              ADMIN_ID="clx_superadmin_platform_01"
              ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              ADMIN_HASH="$SUPERADMIN_HASH"
              SQL_AUTH=$(printf "INSERT INTO users (id,email,name,password_hash,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','%s','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (email) DO UPDATE SET password_hash=EXCLUDED.password_hash,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL" "$ADMIN_HASH")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL_AUTH" 2>&1 || true

              echo "=== Restarting all services ==="
              cd /opt/haccp
              docker compose up -d --remove-orphans 2>&1 | tail -20
              sleep 25

              echo "=== Final container status ==="
              docker ps --format "table {{.Names}}\t{{.Status}}" | grep haccp || true

              echo "=== Login test ==="
              curl -s -X POST http://localhost/api/v1/auth/login -H "Content-Type: application/json" -d "{\"email\":\"${SUPERADMIN_EMAIL:-superadmin@haccp.com}\",\"password\":\"Admin@HACCP2024!\"}" | head -c 500

              exit 0
            fi

            if [ "$ACTION" = "run-migrations" ]; then
              echo "=== Running Prisma migrations for all services ==="
              cd /opt/haccp
              git fetch origin && git checkout main-sync 2>/dev/null || true && git reset --hard origin/main-sync
              echo "=== tenant-service migration ==="
              docker exec haccp-tenants npx prisma migrate deploy --schema=/app/prisma/schema.prisma 2>&1 || echo "tenant migration error (see above)"
              echo "=== auth-service migration ==="
              docker exec haccp-auth npx prisma migrate deploy --schema=/app/prisma/schema.prisma 2>&1 || echo "auth migration error"
              echo "=== user-service migration ==="
              docker exec haccp-users npx prisma migrate deploy --schema=/app/prisma/schema.prisma 2>&1 || echo "user migration error"
              echo "=== Verifying new tables exist in haccp_tenants DB ==="
              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_tenants \
                -c "\dt" 2>&1 | grep -E "tenant_modules|tenant_subscriptions|sites|zones" || echo "Tables not found yet"
              echo "=== Migrations complete ==="
              exit 0
            fi

            if [ "$ACTION" = "init-tenant-modules" ]; then
              cd /opt/haccp
              git fetch origin && git checkout main-sync 2>/dev/null || true && git reset --hard origin/main-sync
              echo "=== Running seed-tenant-modules.sh ==="
              bash infrastructure/scripts/seed-tenant-modules.sh
              echo "=== init-tenant-modules complete ==="
              exit 0
            fi

            if [ "$ACTION" = "diagnose" ]; then
              cd /opt/haccp && git log --oneline -3
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "haccp|NAME" || true
              ss -tlnp | grep -E "3001|:80 " || true
              echo "=== Port 3001 redirect check ===" && curl -so /dev/null -w "3001: HTTP %{http_code}\n" --max-time 5 http://localhost:3001/ || true
              echo "=== VITE_API_URL in bundle ===" && docker exec haccp-web sh -c 'grep -ro "178\.105\.126\.165" /usr/share/nginx/html/assets/*.js 2>/dev/null | head -3 || echo "not found"'
              cat /opt/haccp/apps/web/.env 2>/dev/null || echo ".env not found"
              PASS="${SUPERADMIN_PASSWORD:-Admin@HACCP2024!}" && EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              echo "=== Login port 80 ===" && curl -s -X POST http://localhost:80/api/v1/auth/login -H "Content-Type: application/json" -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" | cut -c1-120
              echo "=== Login port 3001 (should 301) ===" && curl -sL -X POST http://localhost:3001/api/v1/auth/login -H "Content-Type: application/json" -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}" | cut -c1-120
              echo "=== CORS preflight ===" && curl -s -I -X OPTIONS http://localhost:80/api/v1/auth/login -H "Origin: http://178.105.126.165:3001" -H "Access-Control-Request-Method: POST" | grep -i "access-control\|HTTP/"
              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER) && PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "SELECT email,role,status,LEFT(password_hash,10) FROM users WHERE email='superadmin@haccp.com';" 2>&1 || true
              df -h / && docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}\t{{.CPUPerc}}" | grep -E "haccp|NAME" || true
              docker logs haccp-auth --tail=20 2>&1 || true
              for i in 1 2 3 4 5 6; do STATUS=$(curl -so /dev/null -w "%{http_code}" -X POST "http://localhost/api/v1/auth/login" -H "Content-Type: application/json" -d '{"email":"x","password":"x"}'); echo "Throttle $i: HTTP $STATUS"; done
              exit 0
            fi

            if [ "$ACTION" = "restart-only" ]; then
              echo "=== Restarting services (no build) ==="
              cd /opt/haccp
              git fetch origin && git checkout main-sync 2>/dev/null || true && git reset --hard origin/main-sync
              docker compose up -d --remove-orphans
              sleep 20
              docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
              docker exec \
                -e SUPERADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}" \
                -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
                haccp-auth node /tmp/create-superadmin.js || true
              echo "=== Services restarted ==="
              exit 0
            fi

            echo "=== Full deploy ==="
            cd /opt/haccp
            git fetch origin && git checkout main-sync 2>/dev/null || true && git reset --hard origin/main-sync

            echo "=== Git commit on server after pull ==="
            git log --oneline -3

            # ── INSTANT nginx reload FIRST ────────────────────────────────────────
            # Tests config validity then reloads. If reload fails, force-recreates
            # the container so the new nginx.conf takes effect either way.
            echo "=== Fast-path: testing and reloading nginx ==="
            if docker exec haccp-gateway nginx -t 2>&1; then
              docker exec haccp-gateway nginx -s reload && echo "nginx reloaded instantly" || echo "reload signal sent"
            else
              echo "nginx config invalid — check errors above"
            fi
            echo "=== Force-recreating gateway to guarantee new config is loaded ==="
            docker compose up -d --force-recreate api-gateway
            sleep 3

            echo "=== Fixing web .env (VITE_API_URL pinned to port 80 to bypass ISP POST blocking) ==="
            # ARCH-DECISION: Pin VITE_API_URL to http://IP (port 80) explicitly.
            # The SPA is accessible on port 3001 (redirect) and port 80. When the
            # browser loads the SPA from port 3001, relative API URLs also go to
            # port 3001 — which Tunisian ISPs block for POST (login, forms).
            # Pinning to port 80 forces ALL API calls to port 80 regardless of
            # which port the browser opened the app on. NestJS uses origin:true
            # so CORS cross-port requests are accepted.
            printf 'VITE_API_URL=https://178.105.126.165\nVITE_WS_URL=\n' > apps/web/.env
            echo "apps/web/.env written: $(cat apps/web/.env)"

            DOCKER_BUILDKIT=1 docker compose build --parallel

            docker compose up -d --remove-orphans

            echo "=== Waiting 30s for services to start ==="
            sleep 30

            echo "=== Container status ==="
            docker compose ps --format "table {{.Name}}\t{{.Status}}" | head -20

            echo "=== Port bindings (3001 must point to haccp-gateway) ==="
            ss -tlnp | grep -E "3001|:80 " || true

            # ── Seed superadmin in BOTH databases ────────────────────────────────
            ADMIN_ID="clx_superadmin_platform_01"
            ADMIN_HASH="$SUPERADMIN_HASH"
            ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
            PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
            PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)

            echo "=== Seeding superadmin into haccp_auth ==="
            SQL_AUTH=$(printf "INSERT INTO users (id,email,name,password_hash,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','%s','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (email) DO UPDATE SET password_hash=EXCLUDED.password_hash, updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL" "$ADMIN_HASH")
            docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL_AUTH" || true

            echo "=== Seeding superadmin into haccp_users (profile DB) ==="
            SQL_USERS=$(printf "INSERT INTO users (id,email,name,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (id) DO UPDATE SET name=EXCLUDED.name,role=EXCLUDED.role,status=EXCLUDED.status,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL")
            docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_users -c "$SQL_USERS" || true

            # ── Self-verification ─────────────────────────────────────────────────
            echo "=== VERIFICATION: VITE_API_URL (http://178.105.126.165) in JS bundle ==="
            docker exec haccp-web sh -c \
              'grep -r "178\.105\.126\.165" /usr/share/nginx/html/assets/*.js 2>/dev/null | head -3 && echo "OK: port-80 URL baked in" || echo "WARNING: URL not found in bundle"'

            echo "=== VERIFICATION: Login test on port 80 ==="
            PASS="${SUPERADMIN_PASSWORD:-Admin@HACCP2024!}"
            R80=$(curl -s -X POST http://localhost:80/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$PASS\"}")
            echo "Port 80: $(echo "$R80" | cut -c1-60)"

            echo "=== VERIFICATION: Login test on port 3001 (browser path) ==="
            R3001=$(curl -s -X POST http://localhost:3001/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$PASS\"}")
            echo "Port 3001: $(echo "$R3001" | cut -c1-60)"

            echo "=== VERIFICATION: Gateway health ==="
            curl -sf http://localhost/health | grep '"status":"ok"'

            echo ""
            echo "=========================================="
            echo "=== DEPLOY COMPLETE — CHECK RESULTS ABOVE"
            echo "=========================================="
