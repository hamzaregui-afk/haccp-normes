name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'init-superadmin-only'
        type: choice
        options:
          - full-deploy
          - restart-only
          - init-superadmin-only

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          timeout: 60m
          script: |
            set -e
            ACTION="${{ github.event.inputs.action || 'full-deploy' }}"
            echo "=== Action: $ACTION ==="

            cd /opt/haccp

            if [ "$ACTION" = "init-superadmin-only" ]; then
              echo "=== Creating SUPER_ADMIN only (no build, no git pull) ==="
              # Write script inline — avoids git pull (disk may be full)
              cat > /tmp/create-superadmin.js << 'SCRIPTEOF'
'use strict';
const bcrypt = require('/app/services/auth-service/node_modules/bcrypt');
const { Client } = require('/app/services/auth-service/node_modules/pg');
const ADMIN_EMAIL    = process.env.SUPERADMIN_EMAIL    || 'superadmin@haccp.com';
const ADMIN_PASSWORD = process.env.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!';
const ADMIN_NAME     = 'Super Administrateur';
const ADMIN_ID       = 'clx_superadmin_platform_01';
const TENANT_ID      = 'platform';
function buildConnectionString(dbName) {
  const base = process.env.DATABASE_URL;
  if (!base) throw new Error('DATABASE_URL is not set');
  return base.replace(/\/[^/]+$/, '/' + dbName);
}
async function connectDB(dbName) {
  const client = new Client({ connectionString: buildConnectionString(dbName) });
  await client.connect();
  return client;
}
async function main() {
  console.log('Generating bcrypt hash...');
  const passwordHash = await bcrypt.hash(ADMIN_PASSWORD, 10);
  const authDb = await connectDB('haccp_auth');
  try {
    await authDb.query(
      `INSERT INTO users (id, email, name, password_hash, role, status, tenant_id, updated_at)
       VALUES ($1,$2,$3,$4,$5::"UserRole",$6::"UserStatus",$7,NOW())
       ON CONFLICT (email) DO UPDATE
         SET name=EXCLUDED.name, password_hash=EXCLUDED.password_hash,
             role=EXCLUDED.role, status=EXCLUDED.status,
             tenant_id=EXCLUDED.tenant_id, updated_at=NOW()`,
      [ADMIN_ID, ADMIN_EMAIL, ADMIN_NAME, passwordHash, 'SUPER_ADMIN', 'ACTIVE', TENANT_ID]
    );
    console.log('haccp_auth OK');
  } finally { await authDb.end(); }
  const usersDb = await connectDB('haccp_users');
  try {
    await usersDb.query(
      `INSERT INTO users (id, email, name, role, status, tenant_id, updated_at)
       VALUES ($1,$2,$3,$4::"UserRole",$5::"UserStatus",$6,NOW())
       ON CONFLICT (id) DO UPDATE
         SET name=EXCLUDED.name, role=EXCLUDED.role,
             status=EXCLUDED.status, tenant_id=EXCLUDED.tenant_id, updated_at=NOW()`,
      [ADMIN_ID, ADMIN_EMAIL, ADMIN_NAME, 'SUPER_ADMIN', 'ACTIVE', TENANT_ID]
    );
    console.log('haccp_users OK');
  } catch(e) { console.warn('haccp_users warning:', e.message); }
  finally { await usersDb.end(); }
  console.log('SUPER_ADMIN ready:', ADMIN_EMAIL);
}
main().catch(e => { console.error('Failed:', e.message); process.exit(1); });
SCRIPTEOF
              docker cp /tmp/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
              docker exec \
                -e SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}" \
                -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
                -e DATABASE_URL="postgresql://postgres:postgres@postgres:5432/haccp_auth" \
                haccp-auth node /tmp/create-superadmin.js
              echo "✅ SUPER_ADMIN created"
              exit 0
            fi

            if [ "$ACTION" = "restart-only" ]; then
              echo "=== Restarting services (no build) ==="
              # Free Docker build cache to reclaim disk space first
              docker builder prune -f || true
              cd /opt/haccp
              git pull origin main || echo "git pull failed (disk?), continuing with existing code"
              docker compose up -d --remove-orphans
              sleep 20
              docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
              docker exec \
                -e SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}" \
                -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
                haccp-auth node /tmp/create-superadmin.js || echo "⚠️  SUPER_ADMIN init skipped (non-fatal)"
              echo "✅ Services restarted"
              exit 0
            fi

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Rebuilding changed images ==="
            # BuildKit inline cache — layers are reused across runs
            DOCKER_BUILDKIT=1 docker compose build --parallel

            echo "=== Restarting services ==="
            docker compose up -d --remove-orphans

            echo "=== Verifying health ==="
            sleep 20
            docker compose ps --format "table {{.Name}}\t{{.Status}}" | grep -v "unhealthy" | head -20

            echo "=== Ensuring SUPER_ADMIN exists ==="
            # Copy the init script into the auth container and run it.
            # Idempotent: ON CONFLICT DO UPDATE — safe on every deploy.
            docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
            docker exec \
              -e SUPERADMIN_EMAIL="${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}" \
              -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
              haccp-auth node /tmp/create-superadmin.js || echo "⚠️  SUPER_ADMIN init skipped (non-fatal)"

            echo "=== Gateway smoke test ==="
            curl -sf http://localhost/health | grep '"status":"ok"'
            echo "✅ Deploy successful"
