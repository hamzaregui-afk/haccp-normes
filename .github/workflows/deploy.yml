name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'init-superadmin-only'
        type: choice
        options:
          - full-deploy
          - restart-only
          - init-superadmin-only
          - diagnose
          - free-space-and-recover
          - reset-password

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Compute bcrypt hash (for init-superadmin-only)
        if: ${{ github.event.inputs.action == 'init-superadmin-only' || github.event.inputs.action == 'free-space-and-recover' || github.event.inputs.action == 'reset-password' || github.event_name == 'push' }}
        run: |
          npm install bcryptjs --no-save --silent
          HASH=$(node -e "
            const b = require('bcryptjs');
            b.hash(process.env.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!', 10).then(h => process.stdout.write(h));
          ")
          echo "SUPERADMIN_HASH=$HASH" >> $GITHUB_ENV
        env:
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SUPERADMIN_HASH: ${{ env.SUPERADMIN_HASH }}
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL || 'superadmin@haccp.com' }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SUPERADMIN_HASH,SUPERADMIN_EMAIL,SUPERADMIN_PASSWORD
          script_stop: true
          timeout: 60m
          script: |
            set -e
            ACTION="${{ github.event.inputs.action || 'full-deploy' }}"
            echo "=== Action: $ACTION ==="

            echo "=== Freeing Docker build cache ==="
            docker builder prune -f 2>/dev/null || true
            df -h / | tail -1

            if [ "$ACTION" = "init-superadmin-only" ]; then
              echo "=== Inserting SUPER_ADMIN via psql (no module deps) ==="
              ADMIN_ID="clx_superadmin_platform_01"
              ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              ADMIN_HASH="$SUPERADMIN_HASH"

              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              echo "=== DB user: $PGUSER ==="

              SQL_AUTH=$(printf "INSERT INTO users (id,email,name,password_hash,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','%s','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (email) DO UPDATE SET password_hash=EXCLUDED.password_hash,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL" "$ADMIN_HASH")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL_AUTH"
              echo "=== haccp_auth OK ==="

              SQL_USERS=$(printf "INSERT INTO users (id,email,name,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (id) DO UPDATE SET name=EXCLUDED.name,role=EXCLUDED.role,status=EXCLUDED.status,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_users -c "$SQL_USERS" || true
              echo "=== haccp_users OK ==="
              exit 0
            fi

            if [ "$ACTION" = "reset-password" ]; then
              echo "=== Resetting superadmin password to SUPERADMIN_PASSWORD secret ==="
              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              ADMIN_HASH="$SUPERADMIN_HASH"
              SQL=$(printf "UPDATE users SET password_hash='%s', updated_at=NOW() WHERE email='%s';" "$ADMIN_HASH" "$ADMIN_EMAIL")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL"
              echo "=== Restarting auth service to reset in-memory throttler (clears IP bans) ==="
              docker restart haccp-auth
              sleep 10
              echo "=== Auth service restarted ==="
              echo "=== Verifying login from server ==="
              LOGIN=$(curl -s -X POST http://localhost/api/v1/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"${SUPERADMIN_PASSWORD:-Admin@HACCP2024!}\"}")
              if echo "$LOGIN" | grep -q "accessToken"; then
                echo "=== ALL OK: password updated + throttler reset + login confirmed ==="
                echo "=== Email: $ADMIN_EMAIL ==="
                echo "=== Password: use SUPERADMIN_PASSWORD secret value ==="
              else
                echo "=== FAILED: $LOGIN ==="
              fi
              exit 0
            fi

            if [ "$ACTION" = "free-space-and-recover" ]; then
              echo "=== Disk BEFORE cleanup ==="
              df -h /

              echo "=== Top space consumers ==="
              du -sh /var/lib/docker/containers 2>/dev/null | head -5 || true
              du -sh /var/lib/docker/overlay2 2>/dev/null | head -5 || true
              du -sh /opt/haccp 2>/dev/null | head -5 || true
              du -sh /var/log 2>/dev/null | head -5 || true

              echo "=== BIGGEST WIN: Truncating all container log files (safe, no data loss) ==="
              find /var/lib/docker/containers -name "*-json.log" -exec truncate -s 0 {} \; 2>/dev/null || true
              echo "=== Logs truncated ==="

              echo "=== Truncating system journal to 50MB ==="
              journalctl --vacuum-size=50M 2>/dev/null || true

              echo "=== Removing unused Docker images ==="
              docker image prune -a -f 2>/dev/null || true

              echo "=== Removing stopped containers ==="
              docker container prune -f 2>/dev/null || true

              echo "=== Clearing /tmp ==="
              rm -rf /tmp/* 2>/dev/null || true

              echo "=== Removing host node_modules if present (containers have their own copies) ==="
              rm -rf /opt/haccp/node_modules 2>/dev/null || true
              find /opt/haccp/services -maxdepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true
              find /opt/haccp/apps -maxdepth 2 -name node_modules -type d -exec rm -rf {} + 2>/dev/null || true

              echo "=== Disk AFTER cleanup ==="
              df -h /

              echo "=== Restarting postgres container to exit recovery mode ==="
              docker stop haccp-postgres 2>/dev/null || true
              sleep 3
              docker start haccp-postgres
              sleep 20

              echo "=== Postgres status ==="
              docker inspect haccp-postgres --format "{{.State.Status}} {{.State.Health.Status}}" 2>/dev/null || true

              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER 2>/dev/null) || true
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD 2>/dev/null) || true
              echo "=== Testing psql connection ==="
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "SELECT 'DB_OK' as status;" 2>&1 || echo "DB STILL NOT READY"

              echo "=== Re-inserting superadmin (in case data was lost) ==="
              ADMIN_ID="clx_superadmin_platform_01"
              ADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"
              ADMIN_HASH="$SUPERADMIN_HASH"
              SQL_AUTH=$(printf "INSERT INTO users (id,email,name,password_hash,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','%s','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (email) DO UPDATE SET password_hash=EXCLUDED.password_hash,updated_at=NOW();" "$ADMIN_ID" "$ADMIN_EMAIL" "$ADMIN_HASH")
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL_AUTH" 2>&1 || true

              echo "=== Restarting all services ==="
              cd /opt/haccp
              docker compose up -d --remove-orphans 2>&1 | tail -20
              sleep 25

              echo "=== Final container status ==="
              docker ps --format "table {{.Names}}\t{{.Status}}" | grep haccp || true

              echo "=== Login test ==="
              curl -s -X POST http://localhost/api/v1/auth/login -H "Content-Type: application/json" -d "{\"email\":\"${SUPERADMIN_EMAIL:-superadmin@haccp.com}\",\"password\":\"Admin@HACCP2024!\"}" | head -c 500

              exit 0
            fi

            if [ "$ACTION" = "diagnose" ]; then
              echo "=== Container status ==="
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "haccp|NAME"

              PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
              PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
              echo "=== DB user: $PGUSER ==="

              echo "=== SuperAdmin row in haccp_auth ==="
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "SELECT id, email, role, status, tenant_id, LEFT(password_hash,7) as hash_prefix, updated_at FROM users WHERE email='superadmin@haccp.com';"

              echo "=== SuperAdmin row in haccp_users ==="
              docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_users -c "SELECT id, email, role, status FROM users WHERE email='superadmin@haccp.com';" || true

              echo "=== Auth service health ==="
              docker exec haccp-auth wget -qO- http://localhost:3010/health 2>/dev/null || echo "HEALTH CHECK FAILED"

              PASS="${SUPERADMIN_PASSWORD:-Admin@HACCP2024!}"
              EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}"

              echo "=== Test 1: Direct gateway (port 80) ==="
              R1=$(curl -s -X POST http://localhost:80/api/v1/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}")
              echo "Port 80: $(echo "$R1" | cut -c1-60)"

              echo "=== Test 2: Via web container (port 3001 = browser path) ==="
              R2=$(curl -s -X POST http://localhost:3001/api/v1/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}")
              echo "Port 3001: $(echo "$R2" | cut -c1-100)"

              echo "=== Test 3: Auth service direct (port 3010) ==="
              R3=$(curl -s -X POST http://localhost:3010/auth/login \
                -H "Content-Type: application/json" \
                -d "{\"email\":\"$EMAIL\",\"password\":\"$PASS\"}")
              echo "Port 3010: $(echo "$R3" | cut -c1-100)"

              echo "=== VITE_API_URL baked into web bundle ==="
              docker exec haccp-web grep -r "178\.105\|localhost\|VITE_API_URL" /usr/share/nginx/html/assets/*.js 2>/dev/null | head -3 || echo "no hardcoded URL found (relative URLs = correct)"
              echo "=== Server apps/web/.env ==="
              cat /opt/haccp/apps/web/.env 2>/dev/null || echo "file not found"

              echo "=== CORS headers from port 80 ==="
              curl -s -I -X OPTIONS http://localhost:80/api/v1/auth/login \
                -H "Origin: http://178.105.126.165:3001" \
                -H "Access-Control-Request-Method: POST" | grep -i "access-control" || echo "no CORS headers"

              echo "=== Disk usage ==="
              df -h /

              exit 0
            fi

            if [ "$ACTION" = "restart-only" ]; then
              echo "=== Restarting services (no build) ==="
              cd /opt/haccp
              git pull origin main
              docker compose up -d --remove-orphans
              sleep 20
              docker cp infrastructure/scripts/create-superadmin.js haccp-auth:/tmp/create-superadmin.js
              docker exec \
                -e SUPERADMIN_EMAIL="${SUPERADMIN_EMAIL:-superadmin@haccp.com}" \
                -e SUPERADMIN_PASSWORD="${{ secrets.SUPERADMIN_PASSWORD || 'Admin@HACCP2024!' }}" \
                haccp-auth node /tmp/create-superadmin.js || true
              echo "=== Services restarted ==="
              exit 0
            fi

            echo "=== Full deploy ==="
            cd /opt/haccp
            git pull origin main

            echo "=== Fixing web .env (VITE_API_URL must be empty for relative URLs) ==="
            printf 'VITE_API_URL=\nVITE_WS_URL=\n' > apps/web/.env
            echo "apps/web/.env written: $(cat apps/web/.env)"

            DOCKER_BUILDKIT=1 docker compose build --parallel

            docker compose up -d --remove-orphans

            sleep 20
            docker compose ps --format "table {{.Name}}\t{{.Status}}" | head -20

            ADMIN_ID="clx_superadmin_platform_01"
            ADMIN_HASH="$SUPERADMIN_HASH"
            PGUSER=$(docker exec haccp-postgres printenv POSTGRES_USER)
            PGPASS=$(docker exec haccp-postgres printenv POSTGRES_PASSWORD)
            SQL=$(printf "INSERT INTO users (id,email,name,password_hash,role,status,tenant_id,updated_at) VALUES ('%s','%s','Super Administrateur','%s','SUPER_ADMIN'::\"UserRole\",'ACTIVE'::\"UserStatus\",'platform',NOW()) ON CONFLICT (email) DO UPDATE SET password_hash=EXCLUDED.password_hash, updated_at=NOW();" "$ADMIN_ID" "${SUPERADMIN_EMAIL:-superadmin@haccp.com}" "$ADMIN_HASH")
            docker exec -e PGPASSWORD="$PGPASS" haccp-postgres psql -U "$PGUSER" -d haccp_auth -c "$SQL" || true

            curl -sf http://localhost/health | grep '"status":"ok"'
            echo "=== Deploy successful ==="
