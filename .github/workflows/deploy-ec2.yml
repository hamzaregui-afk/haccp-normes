name: Deploy to EC2

# ─── Trigger ──────────────────────────────────────────────────────────────────
# Runs automatically on every push to main, OR manually via the Actions UI.
on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker build (re-use existing images)'
        required: false
        default: 'false'

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: false   # Never cancel an in-flight deploy

env:
  REGISTRY:      ghcr.io
  IMAGE_PREFIX:  ghcr.io/${{ github.repository }}
  COMPOSE_FILE:  docker-compose.yml
  PROD_OVERRIDE: deploy/docker-compose.prod.yml

# ─── Jobs ─────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Build + push all images to GHCR ──────────────────────────────────────
  build:
    name: Build images
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - tenant-service
          - control-service
          - nonconformity-service
          - asset-service
          - notification-service
          - report-service
          - dlc-service
          - audit-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  # ── 2. Build + push web app ─────────────────────────────────────────────────
  build-web:
    name: Build web app
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max

  # ── 3. Deploy to EC2 ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build, build-web]
    # Run deploy even if build was skipped (manual skip_build=true)
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ubuntu
          key:         ${{ secrets.EC2_SSH_KEY }}
          timeout:     300s
          script: |
            set -euo pipefail
            cd /opt/haccp

            echo "📥  Pulling latest code…"
            git fetch origin main
            git reset --hard origin/main

            echo "🔑  Logging in to GHCR…"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            echo "📦  Pulling new images…"
            docker compose -f ${{ env.COMPOSE_FILE }} \
                           -f ${{ env.PROD_OVERRIDE }} pull

            echo "🚀  Starting updated stack…"
            docker compose -f ${{ env.COMPOSE_FILE }} \
                           -f ${{ env.PROD_OVERRIDE }} \
                           up -d --remove-orphans

            echo "🗃️  Running Prisma migrations…"
            bash infrastructure/scripts/migrate.sh

            echo "🧹  Pruning unused images…"
            docker image prune -f

            echo "✅  Deploy complete — $(date '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  60s
          script: |
            sleep 10
            curl -sf http://localhost/health | jq '.status' | grep -q '"ok"'
            echo "✅  Gateway health check passed"
