global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'haccp-auth-service'
    static_configs:
      - targets: ['host.docker.internal:3010']
    metrics_path: '/metrics'

  - job_name: 'haccp-user-service'
    static_configs:
      - targets: ['host.docker.internal:3011']
    metrics_path: '/metrics'

  - job_name: 'haccp-control-service'
    static_configs:
      - targets: ['host.docker.internal:3012']
    metrics_path: '/metrics'

  - job_name: 'haccp-nonconformity-service'
    static_configs:
      - targets: ['host.docker.internal:3013']
    metrics_path: '/metrics'

  - job_name: 'haccp-asset-service'
    static_configs:
      - targets: ['host.docker.internal:3014']
    metrics_path: '/metrics'

  - job_name: 'haccp-notification-service'
    static_configs:
      - targets: ['host.docker.internal:3015']
    metrics_path: '/metrics'

  - job_name: 'haccp-report-service'
    static_configs:
      - targets: ['host.docker.internal:3016']
    metrics_path: '/metrics'

  - job_name: 'haccp-dlc-service'
    static_configs:
      - targets: ['host.docker.internal:3017']
    metrics_path: '/metrics'

  - job_name: 'haccp-tenant-service'
    static_configs:
      - targets: ['host.docker.internal:3018']
    metrics_path: '/metrics'

  - job_name: 'haccp-audit-service'
    static_configs:
      - targets: ['host.docker.internal:3019']
    metrics_path: '/metrics'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
