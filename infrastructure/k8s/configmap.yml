apiVersion: v1
kind: ConfigMap
metadata:
  name: haccp-config
  namespace: haccp
data:
  NODE_ENV: "production"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  MINIO_ENDPOINT: "minio-service"
  MINIO_PORT: "9000"
  ALLOWED_ORIGINS: "https://haccp.yourdomain.com"
  APP_URL: "https://haccp.yourdomain.com"
