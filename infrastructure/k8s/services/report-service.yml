apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: haccp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      initContainers:
        - name: migrate
          image: haccp/report-service:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_reports"
      containers:
        - name: report-service
          image: haccp/report-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3016
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: PORT
              value: "3016"
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_reports"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq-service:5672"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: haccp-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: haccp-secrets
                  key: MINIO_ROOT_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 3016
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3016
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: report-service
  namespace: haccp
spec:
  selector:
    app: report-service
  ports:
    - port: 3016
      targetPort: 3016
