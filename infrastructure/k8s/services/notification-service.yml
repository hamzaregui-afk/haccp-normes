apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: haccp
spec:
  # ARCH-DECISION: replicas=1 until @socket.io/redis-adapter is wired up.
  # Socket.io requires sticky sessions or a shared Redis adapter for horizontal
  # scaling. Adding replicas>1 without the adapter means WebSocket clients
  # connected to different pods won't receive each other's broadcasts.
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: migrate
          image: haccp/notification-service:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_notifications"
      containers:
        - name: notification-service
          image: haccp/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3015
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: PORT
              value: "3015"
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_notifications"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq-service:5672"
          livenessProbe:
            httpGet:
              path: /health
              port: 3015
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3015
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: haccp
spec:
  selector:
    app: notification-service
  ports:
    - port: 3015
      targetPort: 3015
