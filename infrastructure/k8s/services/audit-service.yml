apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-service
  namespace: haccp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: audit-service
  template:
    metadata:
      labels:
        app: audit-service
    spec:
      initContainers:
        - name: migrate
          image: haccp/audit-service:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: DATABASE_URL
              # ARCH-DECISION: Same DB isolation as main container — append-only
              # RLS policy created by migration SQL enforces insert-only at PG level.
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_audit"
      containers:
        - name: audit-service
          image: haccp/audit-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3019
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: PORT
              value: "3019"
            - name: DATABASE_URL
              # ARCH-DECISION: audit_db is a separate database, intentionally
              # isolated from all other services. The DB-level constraint (no
              # UPDATE/DELETE) is the last line of defence for the append-only
              # regulatory requirement. Shared DB access would bypass it.
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_audit"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq-service:5672"
          livenessProbe:
            httpGet:
              path: /health
              port: 3019
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3019
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: audit-service
  namespace: haccp
spec:
  selector:
    app: audit-service
  ports:
    - port: 3019
      targetPort: 3019
