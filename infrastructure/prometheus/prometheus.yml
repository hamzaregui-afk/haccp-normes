global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:3010']
    metrics_path: '/metrics'

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:3011']

  - job_name: 'control-service'
    static_configs:
      - targets: ['control-service:3012']

  - job_name: 'nonconformity-service'
    static_configs:
      - targets: ['nonconformity-service:3013']

  - job_name: 'asset-service'
    static_configs:
      - targets: ['asset-service:3014']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:3015']

  - job_name: 'report-service'
    static_configs:
      - targets: ['report-service:3016']

  - job_name: 'dlc-service'
    static_configs:
      - targets: ['dlc-service:3017']

  - job_name: 'tenant-service'
    static_configs:
      - targets: ['tenant-service:3018']

  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit-service:3019']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
