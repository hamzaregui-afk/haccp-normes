    location /api/v1/documents {
      set $svc http://asset-service:3014;
      limit_req zone=upload burst=20 nodelay;
      client_max_body_size 20m;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
