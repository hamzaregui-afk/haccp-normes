    }

    # Tracability service — photo uploads use the upload zone (10r/s)
    location /api/v1/tracabilities {
      set $svc http://tracability-service:3020;
      limit_req zone=upload burst=20 nodelay;
      client_max_body_size 20m;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /socket.io {
      set $svc http://notification-service:3015;
      proxy_pass $svc;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # MinIO object storage — proxied through gateway to avoid mixed-content errors.
    # ARCH-DECISION: Presigned URLs are signed with Host "minio:9000" (internal endpoint).
    # We must forward that exact Host header so MinIO's HMAC validation passes.
    # Browser fetches https://server/storage/bucket/key?sig → nginx → http://minio:9000/bucket/key?sig
    location /storage/ {
      set $minio http://minio:9000;
      proxy_pass $minio/;
      # Preserve the original signed Host so MinIO HMAC validation succeeds
      proxy_set_header Host            "minio:9000";
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      # Auth is in the presigned query params — no extra headers needed
      proxy_pass_request_headers off;
      proxy_set_header Host "minio:9000";
      # Stream large files without buffering them fully in nginx memory
      proxy_buffering off;
      proxy_read_timeout 300s;
    }

    location / {
      set $web http://web:80;
      proxy_pass            $web;
      proxy_set_header      Host              $host;
      proxy_set_header      X-Real-IP         $remote_addr;
      proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-Proto https;
      proxy_read_timeout    30s;
      proxy_connect_timeout 10s;
    }
  }

  # ── Port 80 → HTTPS redirect ──────────────────────────────────────────────────
  # Once HTTPS is active, redirect all plain HTTP to HTTPS.
  # Port 3001 redirect block below handles the legacy port.

  # ── Port 3001 → Port 80 redirect ─────────────────────────────────────────────
  # ARCH-DECISION: Port 3001 is mapped to this container by docker-compose so
  # the React SPA could be served at the same origin it calls APIs on. However,
  # some ISPs (particularly Tunisian mobile carriers) apply DPI and block HTTP
  # POST requests on non-standard ports (anything except 80 and 443).
  # GET requests pass through but POST (login, form submissions) are silently
  # dropped before they reach nginx, producing "Erreur de connexion (réseau)".
  # Solution: Port 3001 now issues a permanent 301 redirect to port 80.
  # The browser follows the redirect, and all subsequent requests — including
  # login POST — happen on port 80 which is never blocked by any ISP.
  server {
    listen 3001;
    server_tokens off;

    # Redirect every request arriving on port 3001 to port 80 (same host, same path)
    return 301 http://$host$request_uri;
  }

  server {
    listen 80;

    client_max_body_size 50m;

    # ── CORS: handled by NestJS, nginx passes through ────────────────────────

    # ── Global Security Headers ───────────────────────────────────────────────
    # Prevent clickjacking — only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing — browser must respect declared Content-Type
    add_header X-Content-Type-Options "nosniff" always;

    # Modern XSS protection via CSP (X-XSS-Protection is deprecated)
    add_header X-XSS-Protection "0" always;

    # Control referrer information sent to third-party sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser API access — no geolocation, camera, payment by default
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # HSTS: Force HTTPS for 1 year (enable only after HTTPS is configured)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — tailored for HACCP SPA:
    # - script-src 'unsafe-inline': required for Vite-built chunks with inline loaders
    # - img-src data: blob: http: https:: required for photo capture (camera), previews,
    #   and MinIO presigned URLs (served over HTTP on internal deployments)
    # - connect-src http: https: ws: wss: : required for Socket.io + MinIO presigned
    #   upload/download URLs (IP varies per deployment — kept permissive intentionally;
    #   JWT Bearer auth is the real security gate, not CSP connect-src)
    # ARCH-DECISION: The server IP is NOT hardcoded here — nginx.conf is a static
    # file baked into the image. Use http:/https: wildcards; actual origin restriction
    # is enforced at the JWT layer, not CSP.
    add_header Content-Security-Policy "
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: blob: http: https:;
      connect-src 'self' http: https: ws: wss:;
      font-src 'self' data: https://fonts.gstatic.com;
      media-src 'self' blob:;
      frame-ancestors 'none';
      form-action 'self';
      base-uri 'self';
    " always;

    # Propagate Correlation ID to all upstream services
    proxy_set_header X-Correlation-ID $correlation_id;
    # Always expose the correlation ID back to the client
    add_header      X-Correlation-ID $correlation_id always;

    # ── Gateway Health ────────────────────────────────────────────────────────

    location /health {
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    # ── /api/v1/ Versioned Routes ─────────────────────────────────────────────
    # ARCH-DECISION: No trailing slash — prevents nginx 301 redirect that loses
    # POST body and query-string params in some Axios versions.

    # Auth service — tighter rate limit to slow brute-force
    location /api/v1/auth {
      set $svc http://auth-service:3010;
      limit_req zone=auth burst=30 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Prevent browsers/proxies from caching auth responses (tokens/session data).
      # ARCH-DECISION: This location-level add_header shadows server-level add_header
      # directives (nginx inheritance rule: any add_header in a block resets the
      # inherited list). Security headers (CSP, X-Frame-Options, etc.) are intentionally
      # omitted here — they protect HTML pages, not JSON API responses. The SPA
      # location (/) inherits all server-level security headers correctly.
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # User service
    location /api/v1/users {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/groups {
