events {
  worker_connections 1024;
}

http {
  upstream auth        { server auth-service:3010; }
  upstream users       { server user-service:3011; }
  upstream controls    { server control-service:3012; }
  upstream nonconformities { server nonconformity-service:3013; }
  upstream assets      { server asset-service:3014; }
  upstream notifications { server notification-service:3015; }
  upstream reports     { server report-service:3016; }
  upstream dlc         { server dlc-service:3017; }
  upstream tenants     { server tenant-service:3018; }
  upstream audit       { server audit-service:3019; }

  # Rate limiting — 100 req/s per IP burst 200
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

  # GZIP compression
  gzip on;
  gzip_types application/json text/plain text/css application/javascript;
  gzip_min_length 1000;

  # Proxy timeouts — report-service PDF generation can take up to 60s
  proxy_connect_timeout 10s;
  proxy_read_timeout    90s;
  proxy_send_timeout    90s;

  server {
    listen 80;

    # Gateway health
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # ── /api/v1/ versioned routes (used by web & mobile clients) ──────────────
    # ARCH-DECISION: All services use global prefix "api/v1" via NestJS
    # setGlobalPrefix. Nginx routes by path segment after /api/v1/ so each
    # service keeps its own controller prefix (e.g. /users, /groups, /products).

    # Auth service — /api/v1/auth/*
    location /api/v1/auth/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # User service — /api/v1/users/* and /api/v1/groups/*
    location /api/v1/users/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/groups/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Asset service — /api/v1/products/*, /api/v1/equipments/*, /api/v1/suppliers/*
    location /api/v1/products/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://assets;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/equipments/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://assets;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/suppliers/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://assets;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Control service — /api/v1/controls/*
    location /api/v1/controls/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://controls;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Nonconformity service — /api/v1/nonconformities/* (photos up to 20 MB)
    location /api/v1/nonconformities/ {
      limit_req zone=api burst=100 nodelay;
      client_max_body_size 20m;
      proxy_pass http://nonconformities;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Notification service REST — /api/v1/notifications/*
    location /api/v1/notifications/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://notifications;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Tenant service — /api/v1/tenants/* (SUPER_ADMIN only, enforced at service)
    location /api/v1/tenants/ {
      proxy_pass http://tenants;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Tenant service — /api/v1/sites/* and /api/v1/zones/* (roles enforced at service)
    location /api/v1/sites/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://tenants;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/zones/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://tenants;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Report service — /api/v1/reports/*
    location /api/v1/reports/ {
      proxy_pass http://reports;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # DLC service — /api/v1/dlc/*
    location /api/v1/dlc/ {
      proxy_pass http://dlc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Audit service — /api/v1/audit/* (read-only from UI)
    location /api/v1/audit/ {
      proxy_pass http://audit;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Legacy /api/<service>/ routes (kept for backward compat) ──────────────

    # Auth
    location /api/auth/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Users
    location /api/users/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Controls (CCP checks)
    location /api/controls/ {
      limit_req zone=api burst=200 nodelay;
      proxy_pass http://controls;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Nonconformities
    location /api/nonconformities/ {
      limit_req zone=api burst=100 nodelay;
      proxy_pass http://nonconformities;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Assets
    location /api/assets/ {
      client_max_body_size 20M;
      proxy_pass http://assets;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Notifications
    location /api/notifications/ {
      proxy_pass http://notifications;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (Socket.io)
    location /socket.io/ {
      proxy_pass http://notifications;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Reports
    location /api/reports/ {
      proxy_pass http://reports;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # DLC
    location /api/dlc/ {
      proxy_pass http://dlc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Tenants (SUPER_ADMIN only — enforced at service level)
    location /api/tenants/ {
      proxy_pass http://tenants;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Audit (read-only from UI — write happens service-to-service internally)
    location /api/audit/ {
      proxy_pass http://audit;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
