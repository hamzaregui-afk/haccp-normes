events {
  worker_connections 1024;
}

http {
  # ARCH-DECISION: Use Docker's embedded DNS resolver (127.0.0.11) with a
  # short TTL so nginx re-resolves service hostnames on every request instead
  # of caching IPs at startup. Without this, upstream blocks cache the IP at
  # startup and break if any service restarts and gets a new IP.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # Rate limiting — 100 req/s per IP burst 200
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

  # GZIP compression
  gzip on;
  gzip_types application/json text/plain text/css application/javascript;
  gzip_min_length 1000;

  # Proxy timeouts — report-service PDF generation can take up to 60s
  proxy_connect_timeout 10s;
  proxy_read_timeout    90s;
  proxy_send_timeout    90s;

  server {
    listen 80;

    # Gateway health
    location /health {
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # ── /api/v1/ versioned routes ──────────────────────────────────────────────

    # ARCH-DECISION: All location blocks use no trailing slash so nginx never
    # issues a 301 redirect when the client omits the trailing slash. With a
    # trailing slash (e.g. /api/v1/auth/) nginx 301-redirects /api/v1/auth to
    # /api/v1/auth/ which (a) loses query-string params in some axios versions
    # and (b) changes POST to GET. Prefix match without trailing slash matches
    # both /api/v1/auth and /api/v1/auth/* equally well.

    # Auth service — /api/v1/auth/*
    location /api/v1/auth {
      set $svc http://auth-service:3010;
      limit_req zone=api burst=50 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # User service — /api/v1/users/* and /api/v1/groups/*
    location /api/v1/users {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/groups {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Asset service
    location /api/v1/products {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/equipments {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/suppliers {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Control service
    location /api/v1/controls {
      set $svc http://control-service:3012;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Nonconformity service
    location /api/v1/nonconformities {
      set $svc http://nonconformity-service:3013;
      limit_req zone=api burst=100 nodelay;
      client_max_body_size 20m;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Notification service REST
    location /api/v1/notifications {
      set $svc http://notification-service:3015;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Tenant service
    location /api/v1/tenants {
      set $svc http://tenant-service:3018;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/sites {
      set $svc http://tenant-service:3018;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/zones {
      set $svc http://tenant-service:3018;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Report service
    location /api/v1/reports {
      set $svc http://report-service:3016;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # DLC service
    location /api/v1/dlc {
      set $svc http://dlc-service:3017;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Audit service
    location /api/v1/audit {
      set $svc http://audit-service:3019;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Legacy /api/<service>/* routes ─────────────────────────────────────────

    location /api/auth {
      set $svc http://auth-service:3010;
      limit_req zone=api burst=50 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/controls {
      set $svc http://control-service:3012;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/nonconformities {
      set $svc http://nonconformity-service:3013;
      limit_req zone=api burst=100 nodelay;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/assets {
      set $svc http://asset-service:3014;
      client_max_body_size 20M;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications {
      set $svc http://notification-service:3015;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (Socket.io)
    location /socket.io {
      set $svc http://notification-service:3015;
      proxy_pass $svc;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location /api/reports {
      set $svc http://report-service:3016;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/dlc {
      set $svc http://dlc-service:3017;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/tenants {
      set $svc http://tenant-service:3018;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/audit {
      set $svc http://audit-service:3019;
      proxy_pass $svc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
