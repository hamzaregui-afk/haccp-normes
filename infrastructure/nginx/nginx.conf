events {
  worker_connections 1024;
}

http {
  # ── DNS Resolution ────────────────────────────────────────────────────────────
  # ARCH-DECISION: Docker's embedded DNS (127.0.0.11) with short TTL ensures
  # upstream IPs are re-resolved on every request. Without this, nginx caches
  # the IP at startup and breaks when any service restarts with a new IP.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # ── Security hardening ────────────────────────────────────────────────────────
  # Hide nginx version from error pages and Server header
  server_tokens off;

  # ── Rate Limiting ─────────────────────────────────────────────────────────────
  # Primary zone: 100 req/s per IP, burst 200
  limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/s;
  # Auth zone: 20 req/s per IP to slow brute-force attacks
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/s;
  # Upload zone: 10 req/s per IP for file uploads
  limit_req_zone $binary_remote_addr zone=upload:10m  rate=10r/s;

  limit_req_status 429;

  # ── GZIP Compression ──────────────────────────────────────────────────────────
  gzip on;
  gzip_types application/json text/plain text/css application/javascript application/xml;
  gzip_min_length 1000;
  gzip_vary on;

  # ── Proxy Timeouts ────────────────────────────────────────────────────────────
  # report-service PDF generation can take up to 60s — use 90s read timeout
  proxy_connect_timeout 10s;
  proxy_read_timeout    90s;
  proxy_send_timeout    90s;
  proxy_buffering       on;
  proxy_buffer_size     4k;
  proxy_buffers         8 16k;

  # ── Correlation ID ────────────────────────────────────────────────────────────
  # Generate a unique request ID for distributed tracing if not provided by client
  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    ""      $request_id;
  }

  # ── Security Headers (applied globally) ──────────────────────────────────────
  # These headers are added to every response via the server block below.
  # Individual location blocks can override specific headers if needed.

  server {
    listen 80;

    client_max_body_size 50m;

    # ── CORS ──────────────────────────────────────────────────────────────────
    # ARCH-DECISION: The web SPA is served from port 3001 (haccp-web container)
    # while the API gateway runs on port 80. Even though the SPA is built with
    # VITE_API_URL='' (relative URLs via web-nginx proxy), older builds or manual
    # server-side .env files can bake in an absolute origin, causing cross-origin
    # requests. Adding CORS here means the API is always reachable regardless of
    # how the SPA's baseURL is configured.
    # Bearer-token auth means CORS with wildcard origin is safe (no cookies).
    set $cors_origin "";
    if ($http_origin ~* "^https?://178\.105\.126\.165(:[0-9]+)?$") {
      set $cors_origin $http_origin;
    }
    if ($http_origin ~* "^https?://localhost(:[0-9]+)?$") {
      set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin  "$cors_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID, Idempotency-Key, X-Requested-With" always;
    add_header Access-Control-Max-Age       "3600" always;

    # Handle CORS preflight (OPTIONS) — return immediately, do not proxy
    if ($request_method = OPTIONS) {
      return 204;
    }

    # ── Global Security Headers ───────────────────────────────────────────────
    # Prevent clickjacking — only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing — browser must respect declared Content-Type
    add_header X-Content-Type-Options "nosniff" always;

    # Modern XSS protection via CSP (X-XSS-Protection is deprecated)
    add_header X-XSS-Protection "0" always;

    # Control referrer information sent to third-party sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser API access — no geolocation, camera, payment by default
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # HSTS: Force HTTPS for 1 year (enable only after HTTPS is configured)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — tailored for HACCP SPA:
    # - script-src 'unsafe-inline': required for Vite-built chunks with inline loaders
    # - img-src data: blob: : required for photo capture (camera) and previews
    # - img-src http://178.105.126.165:9000: MinIO public URL for photos (TODO: move to presigned)
    # - connect-src ws: wss: : required for Socket.io WebSocket
    add_header Content-Security-Policy "
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: http://178.105.126.165:9000 https:;
      connect-src 'self' ws: wss: http://178.105.126.165:9000;
      font-src 'self' data:;
      media-src 'self' blob:;
      frame-ancestors 'none';
      form-action 'self';
      base-uri 'self';
    " always;

    # Propagate Correlation ID to all upstream services
    proxy_set_header X-Correlation-ID $correlation_id;
    # Always expose the correlation ID back to the client
    add_header      X-Correlation-ID $correlation_id always;

    # ── Gateway Health ────────────────────────────────────────────────────────

    location /health {
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    # ── /api/v1/ Versioned Routes ─────────────────────────────────────────────
    # ARCH-DECISION: No trailing slash — prevents nginx 301 redirect that loses
    # POST body and query-string params in some Axios versions.

    # Auth service — tighter rate limit to slow brute-force
    location /api/v1/auth {
      set $svc http://auth-service:3010;
      limit_req zone=auth burst=30 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # ARCH-DECISION: add_header in a location block shadows ALL server-level
      # add_header directives (nginx inheritance rule). We must repeat CORS
      # headers here so they are included on auth responses in addition to
      # Cache-Control.
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      add_header Access-Control-Allow-Origin  "$cors_origin" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID, Idempotency-Key, X-Requested-With" always;
    }

    # User service
    location /api/v1/users {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/groups {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Asset service
    location /api/v1/products {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/equipments {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/suppliers {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GED — file uploads (tighter rate, larger body)
    location /api/v1/documents {
      set $svc http://asset-service:3014;
      limit_req zone=upload burst=20 nodelay;
      client_max_body_size 20m;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/document-requests {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Control service — photos use upload zone
    location /api/v1/controls {
      set $svc http://control-service:3012;
      client_max_body_size 20m;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nonconformity service
    location /api/v1/nonconformities {
      set $svc http://nonconformity-service:3013;
      limit_req zone=api burst=100 nodelay;
      client_max_body_size 20m;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Notification service REST
    location /api/v1/notifications {
      set $svc http://notification-service:3015;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Tenant service
    location /api/v1/tenants {
      set $svc http://tenant-service:3018;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/sites {
      set $svc http://tenant-service:3018;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/zones {
      set $svc http://tenant-service:3018;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Report service — long timeout for PDF generation
    location /api/v1/reports {
      set $svc http://report-service:3016;
      proxy_read_timeout 120s;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DLC service
    location /api/v1/dlc {
      set $svc http://dlc-service:3017;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audit service
    location /api/v1/audit {
      set $svc http://audit-service:3019;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (Socket.io) ─────────────────────────────────────────────────
    # ARCH-DECISION: HTTP/1.1 is required for Upgrade header (WebSocket handshake).
    # proxy_read_timeout extended so idle socket connections are not killed.
    location /socket.io {
      set $svc http://notification-service:3015;
      proxy_pass $svc;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;   # 1 hour — WebSocket connections are long-lived
      proxy_send_timeout 3600s;
    }

    # ── Legacy /api/<service>/* Routes ────────────────────────────────────────

    location /api/auth {
      set $svc http://auth-service:3010;
      limit_req zone=auth burst=30 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/controls {
      set $svc http://control-service:3012;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/nonconformities {
      set $svc http://nonconformity-service:3013;
      limit_req zone=api burst=100 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/assets {
      set $svc http://asset-service:3014;
      client_max_body_size 20m;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/notifications {
      set $svc http://notification-service:3015;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/reports {
      set $svc http://report-service:3016;
      proxy_read_timeout 120s;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/dlc {
      set $svc http://dlc-service:3017;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/tenants {
      set $svc http://tenant-service:3018;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/audit {
      set $svc http://audit-service:3019;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Per-service health probes ─────────────────────────────────────────────
    # Not rate-limited so monitoring tools (Prometheus, UptimeRobot) can poll freely.
    # Protected by the internal Docker network — not accessible from the internet.

    location /api/health/auth          { set $s http://auth-service:3010;           proxy_pass $s/health; }
    location /api/health/users         { set $s http://user-service:3011;           proxy_pass $s/health; }
    location /api/health/controls      { set $s http://control-service:3012;        proxy_pass $s/health; }
    location /api/health/nonconformities { set $s http://nonconformity-service:3013; proxy_pass $s/health; }
    location /api/health/assets        { set $s http://asset-service:3014;          proxy_pass $s/health; }
    location /api/health/notifications { set $s http://notification-service:3015;   proxy_pass $s/health; }
    location /api/health/reports       { set $s http://report-service:3016;         proxy_pass $s/health; }
    location /api/health/dlc           { set $s http://dlc-service:3017;            proxy_pass $s/health; }
    location /api/health/tenants       { set $s http://tenant-service:3018;         proxy_pass $s/health; }
    location /api/health/audit         { set $s http://audit-service:3019;          proxy_pass $s/health; }
  }
}
