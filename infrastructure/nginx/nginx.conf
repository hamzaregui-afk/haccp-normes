events {
  worker_connections 1024;
}

http {
  # ── DNS Resolution ────────────────────────────────────────────────────────────
  # ARCH-DECISION: Docker's embedded DNS (127.0.0.11) with short TTL ensures
  # upstream IPs are re-resolved on every request. Without this, nginx caches
  # the IP at startup and breaks when any service restarts with a new IP.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # ── CORS ─────────────────────────────────────────────────────────────────────
  # ARCH-DECISION: CORS is handled exclusively by NestJS (app.enableCors()).
  # nginx does NOT add any Access-Control-* headers and does NOT strip them.
  # NestJS produces exactly ONE Access-Control-Allow-Origin per response.
  # The old approach (adding CORS at nginx level) produced DUPLICATE headers
  # alongside NestJS's headers → Fetch spec network error (ERR_NETWORK).
  # The second approach (proxy_hide_header at http level) stripped ALL CORS
  # headers including those needed by OPTIONS preflights → also ERR_NETWORK.
  # Correct approach: let NestJS CORS pass through untouched.

  # ── Security hardening ────────────────────────────────────────────────────────
  # Hide nginx version from error pages and Server header
  server_tokens off;

  # ── Rate Limiting ─────────────────────────────────────────────────────────────
  # Primary zone: 100 req/s per IP, burst 200
  limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/s;
  # Auth zone: 20 req/s per IP to slow brute-force attacks
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/s;
  # Upload zone: 10 req/s per IP for file uploads
  limit_req_zone $binary_remote_addr zone=upload:10m  rate=10r/s;

  limit_req_status 429;

  # ── GZIP Compression ──────────────────────────────────────────────────────────
  gzip on;
  gzip_types application/json text/plain text/css application/javascript application/xml;
  gzip_min_length 1000;
  gzip_vary on;

  # ── Proxy Timeouts ────────────────────────────────────────────────────────────
  # report-service PDF generation can take up to 60s — use 90s read timeout
  proxy_connect_timeout 10s;
  proxy_read_timeout    90s;
  proxy_send_timeout    90s;
  proxy_buffering       on;
  proxy_buffer_size     4k;
  proxy_buffers         8 16k;

  # ── Correlation ID ────────────────────────────────────────────────────────────
  # Generate a unique request ID for distributed tracing if not provided by client
  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    ""      $request_id;
  }

  # ── Security Headers (applied globally) ──────────────────────────────────────
  # These headers are added to every response via the server block below.
  # Individual location blocks can override specific headers if needed.

  # ── HTTPS (port 443) ──────────────────────────────────────────────────────────
  # ARCH-DECISION: Self-signed certificate on port 443.
  # ISP DPI cannot inspect HTTP method inside TLS — POST requests are invisible
  # to the carrier and cannot be selectively blocked. This is the definitive fix
  # for Tunisian ISPs that silently drop HTTP POST on any plain-text port.
  # Cert is generated by the setup-https CI action: openssl req -x509 -newkey
  # rsa:2048 -keyout /opt/haccp/ssl/key.pem -out /opt/haccp/ssl/cert.pem
  # The browser shows "Not secure" warning once — user clicks Advanced → Proceed.
  server {
    listen 443 ssl;
    server_tokens off;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    proxy_set_header X-Correlation-ID $correlation_id;
    add_header      X-Correlation-ID $correlation_id always;

    location /health {
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }

    location /api/v1/auth {
      set $svc http://auth-service:3010;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # User service
    location /api/v1/users {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/v1/groups {
      set $svc http://user-service:3011;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    # Asset service
    location /api/v1/products {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/v1/equipments {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/v1/suppliers {
      set $svc http://asset-service:3014;
      limit_req zone=api burst=200 nodelay;
      proxy_pass $svc;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
