# Testing environment — ephemeral, no volumes
# Usage: docker compose -f docker-compose.test.yml up -d && pnpm test:integration

version: '3.9'

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: haccp_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"    # Different port to avoid colliding with dev
    tmpfs:
      - /var/lib/postgresql/data  # In-memory — fast, no cleanup needed

  redis-test:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  rabbitmq-test:
    image: rabbitmq:3.12-alpine
    ports:
      - "5673:5672"
