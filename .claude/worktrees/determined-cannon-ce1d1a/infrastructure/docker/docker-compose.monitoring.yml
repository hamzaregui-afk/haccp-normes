version: '3.9'
# ─── Monitoring stack ──────────────────────────────────────────────────────────
# Run alongside infra: docker compose -f docker-compose.infra.yml -f docker-compose.monitoring.yml up -d
# Prometheus scrapes /metrics from each NestJS service (running locally on host).
# Grafana is pre-configured with Prometheus as datasource.

networks:
  haccp-dev:
    external: true   # Uses the network created by docker-compose.infra.yml

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: haccp-dev-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - haccp-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Allows container to reach host services

  grafana:
    image: grafana/grafana:10.4.0
    container_name: haccp-dev-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: haccp_grafana_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3030
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    ports:
      - "3030:3000"
    networks:
      - haccp-dev
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
