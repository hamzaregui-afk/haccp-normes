apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: haccp-ingress
  namespace: haccp
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Rate limiting — gateway-level defence (service-level ThrottlerModule is second layer)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # WebSocket upgrade for Socket.io (notification-service)
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # CORS — origins controlled at service level, gateway just passes through
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://haccp.yourdomain.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept"
    # TLS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - haccp.yourdomain.com
      secretName: haccp-tls
  rules:
    - host: haccp.yourdomain.com
      http:
        paths:
          # Auth service — tighter rate limit enforced at service level (5 login/min)
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3010

          # User management
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3011

          - path: /api/v1/groups
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 3011

          # Control (CCP templates + tasks)
          - path: /api/v1/controls
            pathType: Prefix
            backend:
              service:
                name: control-service
                port:
                  number: 3012

          # Non-conformities + photo uploads
          - path: /api/v1/nonconformities
            pathType: Prefix
            backend:
              service:
                name: nonconformity-service
                port:
                  number: 3013

          # Asset management (products, equipments, suppliers)
          - path: /api/v1/products
            pathType: Prefix
            backend:
              service:
                name: asset-service
                port:
                  number: 3014

          - path: /api/v1/equipments
            pathType: Prefix
            backend:
              service:
                name: asset-service
                port:
                  number: 3014

          - path: /api/v1/suppliers
            pathType: Prefix
            backend:
              service:
                name: asset-service
                port:
                  number: 3014

          # Notifications REST + WebSocket (Socket.io)
          - path: /api/v1/notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3015

          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 3015

          # Reports + PDF download
          - path: /api/v1/reports
            pathType: Prefix
            backend:
              service:
                name: report-service
                port:
                  number: 3016

          # DLC calculation + label print
          - path: /api/v1/dlc
            pathType: Prefix
            backend:
              service:
                name: dlc-service
                port:
                  number: 3017

          # Tenant management (SUPER_ADMIN only — enforced at service level)
          - path: /api/v1/tenants
            pathType: Prefix
            backend:
              service:
                name: tenant-service
                port:
                  number: 3018

          # Audit log — read-only via REST, writes via RabbitMQ
          - path: /api/v1/audit
            pathType: Prefix
            backend:
              service:
                name: audit-service
                port:
                  number: 3019

          # Web SPA — served last (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
