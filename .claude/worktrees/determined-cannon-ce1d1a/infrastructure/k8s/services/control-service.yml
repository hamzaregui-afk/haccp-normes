apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-service
  namespace: haccp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-service
  template:
    metadata:
      labels:
        app: control-service
    spec:
      initContainers:
        - name: migrate
          image: haccp/control-service:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_controls"
      containers:
        - name: control-service
          image: haccp/control-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3012
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: PORT
              value: "3012"
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_controls"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq-service:5672"
          livenessProbe:
            httpGet:
              path: /health
              port: 3012
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3012
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: control-service
  namespace: haccp
spec:
  selector:
    app: control-service
  ports:
    - port: 3012
      targetPort: 3012
