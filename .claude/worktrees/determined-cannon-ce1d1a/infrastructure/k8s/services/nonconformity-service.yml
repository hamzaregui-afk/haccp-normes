apiVersion: apps/v1
kind: Deployment
metadata:
  name: nonconformity-service
  namespace: haccp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nonconformity-service
  template:
    metadata:
      labels:
        app: nonconformity-service
    spec:
      initContainers:
        - name: migrate
          image: haccp/nonconformity-service:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_nonconformities"
      containers:
        - name: nonconformity-service
          image: haccp/nonconformity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3013
          envFrom:
            - configMapRef:
                name: haccp-config
            - secretRef:
                name: haccp-secrets
          env:
            - name: PORT
              value: "3013"
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-service:5432/haccp_nonconformities"
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@rabbitmq-service:5672"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: haccp-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: haccp-secrets
                  key: MINIO_ROOT_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 3013
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3013
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: nonconformity-service
  namespace: haccp
spec:
  selector:
    app: nonconformity-service
  ports:
    - port: 3013
      targetPort: 3013
