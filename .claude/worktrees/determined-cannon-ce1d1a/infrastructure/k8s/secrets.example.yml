# ⚠️  DO NOT commit a secrets.yml with real values. This is an example only.
# Create your actual secrets.yml from this template and apply it manually:
#
#   kubectl apply -f secrets.yml
#
# Or use Sealed Secrets / External Secrets Operator for GitOps workflows.
apiVersion: v1
kind: Secret
metadata:
  name: haccp-secrets
  namespace: haccp
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: "haccp_user"
  POSTGRES_PASSWORD: "CHANGE_ME_strong_password"

  # Redis
  REDIS_PASSWORD: "CHANGE_ME_redis_password"

  # RabbitMQ
  RABBITMQ_USER: "haccp_rabbit"
  RABBITMQ_PASSWORD: "CHANGE_ME_rabbit_password"

  # MinIO (S3-compatible storage)
  MINIO_ROOT_USER: "haccp_minio"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_minio_password_min12chars"

  # JWT — must be ≥32 chars, use: openssl rand -hex 32
  JWT_SECRET: "CHANGE_ME_jwt_secret_min_32_characters_long"
  JWT_REFRESH_SECRET: "CHANGE_ME_refresh_secret_min_32_chars"

  # Email (SMTP)
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: "noreply@example.com"
  SMTP_PASS: "CHANGE_ME_smtp_password"
  SMTP_FROM: "NORMES HACCP <noreply@example.com>"
---
# TLS certificate — use cert-manager or supply manually
# kubectl create secret tls haccp-tls \
#   --cert=path/to/tls.crt \
#   --key=path/to/tls.key \
#   -n haccp
