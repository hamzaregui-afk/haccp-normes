name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ─── 1. Build & push microservices ────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - tenant-service
          - control-service
          - nonconformity-service
          - asset-service
          - notification-service
          - report-service
          - dlc-service
          - audit-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 2. Build & push web app ─────────────────────────────────────────────
  build-web:
    name: Build & Push — web-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web-app:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/web-app:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Update K8s image tags & deploy ───────────────────────────────────
  deploy:
    name: Deploy to Production (K8s)
    runs-on: ubuntu-latest
    needs: [build-and-push, build-web]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Apply K8s config (ConfigMaps, Services, Ingress, StatefulSets)
        run: |
          # Apply ConfigMap first so it exists before StatefulSets reference it
          kubectl apply -f infrastructure/k8s/namespace.yml
          kubectl apply -f infrastructure/k8s/configmap.yml
          kubectl apply -f infrastructure/k8s/infra/postgres-init-configmap.yml
          # Apply everything via Kustomize (idempotent)
          kubectl apply -k infrastructure/k8s/

      - name: Patch service image tags to this commit
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          SERVICES="auth-service user-service control-service nonconformity-service asset-service notification-service report-service dlc-service tenant-service audit-service"
          for svc in $SERVICES; do
            kubectl set image deployment/$svc \
              $svc=${{ env.IMAGE_PREFIX }}/$svc:$SHORT_SHA \
              -n haccp
          done
          kubectl set image deployment/web-app \
            web-app=${{ env.IMAGE_PREFIX }}/web-app:${{ github.sha }} \
            -n haccp

      - name: Wait for all rollouts to complete
        run: |
          SERVICES="auth-service user-service control-service nonconformity-service asset-service notification-service report-service dlc-service tenant-service audit-service web-app"
          for svc in $SERVICES; do
            echo "⏳ Waiting for $svc..."
            kubectl rollout status deployment/$svc -n haccp --timeout=300s
          done
          echo "✅ All deployments rolled out"

      - name: Smoke test — gateway health endpoint
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.GATEWAY_URL }}/health" --max-time 10)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Gateway health check failed (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Gateway is healthy (HTTP $HTTP_STATUS)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy failed at commit ${{ github.sha }}"
          echo "::error::Review rollout logs and consider running:"
          echo "::error::  kubectl rollout undo deployment/<failed-service> -n haccp"
