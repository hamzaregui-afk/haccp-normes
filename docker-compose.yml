version: '3.9'

# ARCH-DECISION: This file lives at the monorepo root so `docker compose up`
# works from the project root as documented in CLAUDE.md. Paths for volume
# mounts are relative to this file (the monorepo root), unlike the older copy
# at infrastructure/docker/docker-compose.yml which used ../ paths.

networks:
  haccp-network:
    driver: bridge
    driver_opts:
      # ARCH-DECISION: MTU 1400 prevents ECONNRESET in WSL2+Docker environments.
      # WSL2's virtual NIC has an effective MTU of ~1400; the default 1500 causes
      # fragmentation that drops TLS handshakes (Prisma engine download, npm registry).
      com.docker.network.driver.mtu: "1400"

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  prometheus-data:
  grafana-data:

services:

  # ── INFRASTRUCTURE ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: haccp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: haccp_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d haccp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: haccp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: haccp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      # ARCH-DECISION: Queue/DLQ declaration is handled programmatically by
      # notification-service on startup (QueueInitService.onModuleInit).
      # We deliberately avoid loading definitions.json via
      # RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS because that would change the
      # container's config hash and cause Docker to recreate the rabbitmq
      # container on `docker compose up -d`, destroying in-flight messages.
      # See services/notification-service/src/queue/queue-init.service.ts.
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"    # Management UI
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: haccp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO Console
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── API GATEWAY ───────────────────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    container_name: haccp-gateway
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      # ARCH-DECISION: Port 3001 also routes to the api-gateway (not the web
      # container). This makes the browser origin (:3001) identical to the API
      # origin — zero CORS overhead. The React SPA is served via location / in
      # nginx.conf which proxies to the web container internally.
      - "3001:80"
    # ARCH-DECISION: condition: service_healthy prevents nginx from starting before
    # microservices are ready. Without this, nginx boots in ~1s and immediately
    # returns 502 for all upstream requests until services finish their DB migrations
    # and port-binding (~10–20s). The healthcheck on each service is a lightweight
    # GET /health that returns 200 only once the service is fully initialised.
    depends_on:
      auth-service:          { condition: service_healthy }
      user-service:          { condition: service_healthy }
      tenant-service:        { condition: service_healthy }
      control-service:       { condition: service_healthy }
      nonconformity-service: { condition: service_healthy }
      asset-service:         { condition: service_healthy }
      notification-service:  { condition: service_healthy }
      report-service:        { condition: service_healthy }
      dlc-service:           { condition: service_healthy }
      audit-service:         { condition: service_healthy }
      web:                   { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MICROSERVICES ─────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: haccp-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: haccp-users
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3011
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_users
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3010
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:     { condition: service_healthy }
      rabbitmq:     { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  tenant-service:
    build:
      context: .
      dockerfile: services/tenant-service/Dockerfile
    container_name: haccp-tenants
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3018
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_tenants
      JWT_SECRET: ${JWT_SECRET}
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: tenant-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3018/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  control-service:
    build:
      context: .
      dockerfile: services/control-service/Dockerfile
    container_name: haccp-controls
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3012
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_controls
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: haccp-control-photos
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://${SERVER_IP:-178.105.126.165}:9000"
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: control-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
      minio:     { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  nonconformity-service:
    build:
      context: .
      dockerfile: services/nonconformity-service/Dockerfile
    container_name: haccp-nc
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3013
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_nonconformities
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: haccp-nc-photos
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://${SERVER_IP:-178.105.126.165}:9000"
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      OTEL_SERVICE_NAME: nonconformity-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
      minio:     { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  asset-service:
    build:
      context: .
      dockerfile: services/asset-service/Dockerfile
    container_name: haccp-assets
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3014
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_assets
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: haccp-documents
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://${SERVER_IP:-178.105.126.165}:9000"
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: asset-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3014/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: haccp-notifications
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3015
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_notifications
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-NORMES HACCP <noreply@haccp.local>}
      APP_URL: ${APP_URL:-http://localhost:3000}
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
      redis:     { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3015/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    container_name: haccp-reports
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3016
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_reports
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_REPORTS: haccp-reports
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://${SERVER_IP:-178.105.126.165}:9000"
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: report-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
      minio:     { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3016/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  dlc-service:
    build:
      context: .
      dockerfile: services/dlc-service/Dockerfile
    container_name: haccp-dlc
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3017
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_dlc
      JWT_SECRET: ${JWT_SECRET}
      AUDIT_SERVICE_URL: http://audit-service:3019/api/v1
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: dlc-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres: { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3017/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  audit-service:
    # ARCH-DECISION: audit-service is append-only by law.
    # No UPDATE/DELETE Prisma calls ever. RLS in init.sql enforces this at DB level.
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: haccp-audit
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3019
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/haccp_audit
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-haccp-internal-dev-secret-change-in-prod}
      OTEL_SERVICE_NAME: audit-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3019/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Give the service 60s to run Prisma migrations before counting failures
      start_period: 60s

  # ── FRONTEND ──────────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # VITE_API_URL must be empty → relative URLs → browser sends requests to
        # its own origin (:3001 or :80, both served by api-gateway).
        VITE_API_URL: ""
        VITE_WS_URL: ""
    container_name: haccp-web
    restart: unless-stopped
    volumes:
      - ./apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # ARCH-DECISION: No external port — the web container is only reachable from
    # inside the Docker network (api-gateway proxies to it via location /).
    # Exposing it directly would allow bypassing the gateway's rate limiting and
    # CORS handling.
    networks:
      - haccp-network
    healthcheck:
      # nginx serves a static SPA — a 200 on / means the bundle is ready.
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── MONITORING ────────────────────────────────────────────────────────────────

  # ── DISTRIBUTED TRACING ──────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: haccp-jaeger
    restart: unless-stopped
    environment:
      # ARCH-DECISION: In-memory storage is fine for dev/staging (traces are
      # ephemeral). For production use SPAN_STORAGE_TYPE=elasticsearch with a
      # proper Elasticsearch cluster to persist traces beyond the 50 000-span
      # in-memory limit.
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "5775:5775/udp"   # Zipkin compact thrift
      - "6831:6831/udp"   # Jaeger compact thrift (UDP)
      - "6832:6832/udp"   # Jaeger binary thrift
      - "5778:5778"       # Config/sampling
      - "16686:16686"     # Jaeger UI
      - "14268:14268"     # HTTP collector (thrift)
      - "14250:14250"     # gRPC collector
      - "9411:9411"       # Zipkin compatible collector
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
    networks:
      - haccp-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686/"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: haccp-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - haccp-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: haccp-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/haccp-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3030:3000"
    networks:
      - haccp-network
