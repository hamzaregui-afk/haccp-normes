server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # ARCH-DECISION: Docker's embedded DNS resolver (127.0.0.11) with a short
  # TTL forces nginx to re-resolve service hostnames on every request. Without
  # this, proxy_pass hostnames are resolved once at startup and break if the
  # target container restarts with a new IP.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  # ARCH-DECISION: Proxy all /api/* and /socket.io calls to the api-gateway
  # container. The web app is served on port 3000 while the gateway runs on
  # port 80 internally; without this proxy the browser would hit the web nginx
  # for API calls and get 404s instead of reaching the microservices.
  location /api/ {
    set $gw http://api-gateway:80;
    client_max_body_size 50m;
    proxy_pass $gw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }

  location /socket.io/ {
    set $gw http://api-gateway:80;
    proxy_pass $gw;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # ARCH-DECISION: `try_files` falls back to index.html for all routes so that
  # React Router (client-side routing) works correctly on full-page refreshes and
  # direct URL navigation. Without this, nginx returns 404 for deep links.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache-bust hashed assets (Vite appends content hash to filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Short TTL for index.html so new deployments are picked up quickly
  location = /index.html {
    expires 5m;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;
  gzip_vary on;
}
