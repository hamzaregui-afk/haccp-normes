server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # ARCH-DECISION: `try_files` falls back to index.html for all routes so that
  # React Router (client-side routing) works correctly on full-page refreshes and
  # direct URL navigation. Without this, nginx returns 404 for deep links.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache-bust hashed assets (Vite appends content hash to filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Short TTL for index.html so new deployments are picked up quickly
  location = /index.html {
    expires 5m;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Disable access logs for health probes (reduces noise)
  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;
  gzip_vary on;
}
